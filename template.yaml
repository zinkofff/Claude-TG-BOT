AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Claude Telegram Bot — News scanner and social media post suggester.
  Scans RSS feeds daily, generates Twitter/LinkedIn drafts via Claude AI,
  and delivers them to Telegram with interactive controls.

Globals:
  Function:
    Runtime: python3.9
    Timeout: 120
    MemorySize: 256
    Architectures:
      - arm64

Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues: [prod, dev]
  AnthropicApiKey:
    Type: String
    NoEcho: true
  TelegramBotToken:
    Type: String
    NoEcho: true
  TelegramChatId:
    Type: String
  ClaudeModel:
    Type: String
    Default: claude-sonnet-4-6
  DigestArticleCount:
    Type: String
    Default: "5"
  ScanSchedule:
    Type: String
    Default: "cron(0 8 * * ? *)"
    Description: EventBridge cron for the daily scan (default 08:00 UTC)
  AllowedChatIds:
    Type: String
    Default: ""
    Description: Comma-separated list of Telegram chat IDs allowed to use the bot

Resources:
  # ──────────────────────────────────────────────────────────────────
  # Lambda Functions
  # ──────────────────────────────────────────────────────────────────

  NewsScannerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub claude-tg-bot-scanner-${Stage}
      Handler: src/handlers/news_scanner.lambda_handler
      Timeout: 300  # 5 min — RSS fetching + Claude API calls
      MemorySize: 512
      Environment:
        Variables:
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          TELEGRAM_BOT_TOKEN: !Ref TelegramBotToken
          TELEGRAM_CHAT_ID: !Ref TelegramChatId
          CLAUDE_MODEL: !Ref ClaudeModel
          DIGEST_ARTICLE_COUNT: !Ref DigestArticleCount
          ARTICLES_TABLE: claude-tg-bot-articles
          DRAFTS_TABLE: claude-tg-bot-drafts
          ALLOWED_CHAT_IDS: !Ref AllowedChatIds
          LOG_LEVEL: INFO
      Policies:
        - DynamoDBCrudPolicy:
            TableName: claude-tg-bot-articles
        - DynamoDBCrudPolicy:
            TableName: claude-tg-bot-drafts

  TelegramWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub claude-tg-bot-webhook-${Stage}
      Handler: src/handlers/telegram_webhook.lambda_handler
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          TELEGRAM_BOT_TOKEN: !Ref TelegramBotToken
          TELEGRAM_CHAT_ID: !Ref TelegramChatId
          CLAUDE_MODEL: !Ref ClaudeModel
          DIGEST_ARTICLE_COUNT: !Ref DigestArticleCount
          ARTICLES_TABLE: claude-tg-bot-articles
          DRAFTS_TABLE: claude-tg-bot-drafts
          SCANNER_FUNCTION_NAME: !Sub claude-tg-bot-scanner-${Stage}
          ALLOWED_CHAT_IDS: !Ref AllowedChatIds
          LOG_LEVEL: INFO
      Events:
        WebhookApi:
          Type: HttpApi
          Properties:
            Path: /webhook
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: claude-tg-bot-drafts
        - DynamoDBReadPolicy:
            TableName: claude-tg-bot-articles
        - LambdaInvokePolicy:
            FunctionName: !Sub claude-tg-bot-scanner-${Stage}

Outputs:
  WebhookUrl:
    Description: URL to register as the Telegram bot webhook
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com/webhook"
  NewsScannerFunctionArn:
    Description: ARN of the news scanner Lambda
    Value: !GetAtt NewsScannerFunction.Arn
  TelegramWebhookFunctionArn:
    Description: ARN of the webhook Lambda
    Value: !GetAtt TelegramWebhookFunction.Arn
